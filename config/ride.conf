CONFIG_ZMK_DISPLAY=n

# RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=n
# CONFIG_WS2812_STRIP=n
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=5
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=178
# CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=10
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
# CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# Increase BT TX power for more stable connection (+8 dBm max for nRF52840)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Tighter BLE connection interval for lower latency
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

